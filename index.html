<!DOCTYPE html>
<html>
<head>
  <title>Mini Browser</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .topbar {
      background: #222;
      padding: 10px;
    }

    input {
      width: 60%;
      padding: 8px;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 8px 15px;
      border: none;
      background: #00aaff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 90vh;
      border: none;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <input id="url" placeholder="Enter URL (example.com)">
    <button onclick="go()">Go</button>
  </div>

  <iframe id="frame"></iframe>

  <script>
    function go() {
      let url = document.getElementById("url").value;

      if (!url.startsWith("http")) {
        url = "https://" + url;
      }

      // Use proxy (IMPORTANT for most sites)
      let proxy = "https://api.allorigins.win/raw?url=";

      document.getElementById("frame").src = proxy + encodeURIComponent(url);
    }
  </script>

</body>
</html>
