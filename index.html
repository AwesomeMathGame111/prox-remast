<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Google Docs</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" id="tabIcon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
</head>

<body>

<div class="tabs" id="tabs"></div>

<div class="topbar">
  <button onclick="newTab()">＋</button>
  <input id="urlInput" placeholder="Search or enter URL...">
  <button onclick="go()">Go</button>
  <button onclick="cloak('classroom')">🎓</button>
  <button onclick="cloak('docs')">📄</button>
</div>

<div class="bookmarks">
  <button onclick="quick('https://google.com')">Google</button>
  <button onclick="quick('https://youtube.com')">YouTube</button>
  <button onclick="quick('https://discord.com')">Discord</button>
</div>

<iframe id="frame"></iframe>

<script src="script.js"></script>
</body>
</html>
